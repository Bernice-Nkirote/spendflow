<svg xmlns="http://www.w3.org/2000/svg" width="500" height="164" viewBox="0 0 500 164" role="img" aria-labelledby="title desc">
  <title id="title">Tendaflow logo</title>
  <desc id="desc">Tendaflow horizontal loader logo with a connected TF mark and brand color wordmark.</desc>
  <defs>
    <linearGradient id="markGradient" x1="112" x2="204" y1="55" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#011C40"/>
      <stop offset="0.48" stop-color="#26658C"/>
      <stop offset="0.76" stop-color="#54ACBF"/>
      <stop offset="1" stop-color="#A7EBF2"/>
    </linearGradient>
    <linearGradient id="wordmarkGradient" x1="238" x2="409" y1="82" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#011C40"/>
      <stop offset="0.58" stop-color="#011C40"/>
      <stop offset="0.82" stop-color="#26658C"/>
      <stop offset="1" stop-color="#54ACBF"/>
    </linearGradient>
    <style>
      .tf-draw {
        stroke-dasharray: 260;
        stroke-dashoffset: 260;
        animation: tfDraw 1.45s ease-out forwards;
      }
      .tf-wordmark {
        opacity: 0;
        animation: tfFade 0.7s ease-out 0.7s forwards;
      }
      @keyframes tfDraw {
        to { stroke-dashoffset: 0; }
      }
      @keyframes tfFade {
        to { opacity: 1; }
      }
    </style>
  </defs>

  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path
      class="tf-draw"
      d="M112 56 H148 M130 56 V93 C130 105 140 110 153 110 H171 C183 110 190 103 190 93 M190 56 V93 M190 56 H229 M190 78 H219"
      stroke="url(#markGradient)"
      stroke-width="5"
    />
  </g>

  <text
    class="tf-wordmark"
    x="246"
    y="97"
    fill="url(#wordmarkGradient)"
    font-family="Inter, Avenir Next, Nunito Sans, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif"
    font-size="43"
    font-weight="700"
    letter-spacing="-0.45"
  >Tendaflow</text>
</svg>
