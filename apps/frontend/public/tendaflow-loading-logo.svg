<svg xmlns="http://www.w3.org/2000/svg" width="500" height="164" viewBox="0 0 500 164" role="img" aria-labelledby="title desc">
  <title id="title">Tendaflow logo</title>
  <desc id="desc">Tendaflow horizontal logo with a TF mark and brand color wordmark.</desc>
  <defs>
    <linearGradient id="markNavy" x1="112" x2="179" y1="55" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#011C40"/>
      <stop offset="0.62" stop-color="#26658C"/>
      <stop offset="1" stop-color="#54ACBF"/>
    </linearGradient>
    <linearGradient id="markAqua" x1="179" x2="208" y1="55" y2="110" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#54ACBF"/>
      <stop offset="1" stop-color="#A7EBF2"/>
    </linearGradient>
    <linearGradient id="wordmarkGradient" x1="250" x2="405" y1="82" y2="82" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#011C40"/>
      <stop offset="0.6" stop-color="#011C40"/>
      <stop offset="0.82" stop-color="#26658C"/>
      <stop offset="1" stop-color="#54ACBF"/>
    </linearGradient>
    <style>
      .tf-draw {
        stroke-dasharray: 180;
        stroke-dashoffset: 180;
        animation: tfDraw 1.45s ease-out forwards;
      }
      .tf-draw-aqua {
        stroke-dasharray: 160;
        stroke-dashoffset: 160;
        animation: tfDraw 1.45s ease-out 0.18s forwards;
      }
      .tf-wordmark {
        opacity: 0;
        animation: tfFade 0.7s ease-out 0.7s forwards;
      }
      @keyframes tfDraw {
        to { stroke-dashoffset: 0; }
      }
      @keyframes tfFade {
        to { opacity: 1; }
      }
    </style>
  </defs>
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <path class="tf-draw" d="M112 55 H148" stroke="url(#markNavy)" stroke-width="5"/>
    <path class="tf-draw" d="M130 55 V91 C130 104 141 110 155 110 C169 110 179 104 179 91" stroke="url(#markNavy)" stroke-width="5"/>
    <path class="tf-draw-aqua" d="M179 55 V110" stroke="url(#markAqua)" stroke-width="5"/>
    <path class="tf-draw-aqua" d="M179 55 H208" stroke="url(#markAqua)" stroke-width="5"/>
    <path class="tf-draw-aqua" d="M179 82 H203" stroke="url(#markAqua)" stroke-width="5"/>
  </g>
  <text class="tf-wordmark" x="250" y="97" fill="url(#wordmarkGradient)" font-family="Inter, Avenir Next, Nunito Sans, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif" font-size="43" font-weight="700" letter-spacing="-1.1">Tendaflow</text>
</svg>